name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Track the latest stable Go (org convention). go.mod floor is 1.26.4.
jobs:
  # Build, vet, race-test, and enforce 100% coverage of the meta-gem. Building
  # the rails/all aggregate also compiles every shipped framework component into
  # the graph, so this lane is the integration proof on amd64.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: gofmt
        shell: bash
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo '::error::gofmt'; exit 1; }
      - name: Test + 100% coverage gate
        shell: bash
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 25
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Cross-compile everything, including the rails/all aggregate, on the six
  # supported 64-bit targets: the proof that the whole Rails stack builds on
  # every architecture. amd64/arm64 also run the test suite natively.
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go env GOARCH && go build ./... && go test ./...

  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x,   qemu: qemu-s390x-static }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Cross-build + test under qemu (${{ matrix.goarch }})
        run: |
          GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build ./...
          GOARCH=${{ matrix.goarch }} go test -exec=${{ matrix.qemu }} ./...

  wasm:
    name: wasm (${{ matrix.goos }}/wasm)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [js, wasip1]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build ${{ matrix.goos }}/wasm
        run: GOOS=${{ matrix.goos }} GOARCH=wasm go build ./...
